services:
  mysql:
    image: mysql:8.4
    container_name: training-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: training_db
      MYSQL_USER: training_user
      MYSQL_PASSWORD: training_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: